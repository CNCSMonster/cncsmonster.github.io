# Zola Configuration for CCM's Personal Homepage
base_url = "https://cncsmonster.github.io"
title = "CCM 的博客"
compile_sass = true
minify_html = true
build_search_index = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]

# Multi-language support
default_language = "zh"

# Taxonomies
taxonomies = [
    {name = "tags", feed = true},
    {name = "categories", feed = true},
]

# Markdown rendering options
[markdown]
highlight_code = true
highlight_theme = "css"
render_emoji = false
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

# Search configuration
[search]
include_title = true
include_description = true
include_path = true
include_content = true
# 使用 JavaScript 格式（Zola 默认）
index_format = "fuse_javascript"

# Additional HTML attributes
[extra]
author = "CCM"
description = "CCM's Personal Homepage - GitHub Notes, Blog Posts, and Open Source Activities"
github_username = "cncsmonster"

# Comment system (Giscus)
giscus_enabled = true
giscus_repo = "CNCSMonster/cncsmonster.github.io"
giscus_repo_id = "R_kgDOJcCqHg"
giscus_category = "General"
giscus_category_id = "DIC_kwDOJcCqHs4C6Jj6"

# Blog Analytics (GoatCounter)
visitor_counter_enabled = true

# ═══════════════════════════════════════════
# Language-specific configuration
# ═══════════════════════════════════════════

# Default language (zh) uses global config above.
# English gets its own search index and RSS feeds.

[languages.en]
title = "CCM's Blog"
build_search_index = true
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
taxonomies = [
    {name = "tags", feed = true},
]

