{% extends "base.html" %}

{% block content %}
<section class="section-page">
    <h1>标签</h1>
    <ul class="tags-list">
        {% for term in terms %}
        <li><a href="{{ term.permalink }}">#{{ term.name }}</a> ({{ term.pages | length }})</li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
