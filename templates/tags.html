{% extends "base.html" %}

{% block title %}{{ taxonomy.name }} | {{ config.title }}{% endblock %}

{% block content %}
<section class="section-page">
    <h1>{{ taxonomy.name | title }}</h1>
    
    <div class="tags-cloud">
        {% for term in terms %}
        <a href="{{ term.permalink }}" class="tag-item">
            <span class="tag-name">#{{ term.name }}</span>
            <span class="tag-count">{{ term.pages | length }}</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
